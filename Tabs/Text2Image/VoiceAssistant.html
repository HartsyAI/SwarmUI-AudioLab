<!-- Voice Assistant Tab for SwarmUI -->
<div class="voice-assistant-tab">
    <div class="voice-assistant-container">
        <div class="voice-controls">
            <div class="voice-status" id="voiceStatus">
                <i class="fas fa-microphone-slash"></i> Ready
            </div>
            <button id="toggleListening" class="btn btn-primary">
                <i class="fas fa-microphone"></i> Start Listening
            </button>
            <div class="voice-settings">
                <div class="form-group">
                    <label for="voiceLanguage">Language</label>
                    <select id="voiceLanguage" class="form-control">
                        <option value="en-US">English (US)</option>
                        <option value="en-GB">English (UK)</option>
                        <option value="es-ES">Spanish</option>
                        <option value="fr-FR">French</option>
                        <option value="de-DE">German</option>
                        <option value="it-IT">Italian</option>
                        <option value="pt-BR">Portuguese</option>
                        <option value="ru-RU">Russian</option>
                        <option value="ja-JP">Japanese</option>
                        <option value="ko-KR">Korean</option>
                        <option value="zh-CN">Chinese</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ttsVoice">Voice</label>
                    <select id="ttsVoice" class="form-control">
                        <option value="default">Default</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="neural">Neural</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="voiceVolume">Volume</label>
                    <input type="range" id="voiceVolume" min="0" max="1" step="0.1" value="0.8" class="form-control">
                </div>
            </div>
        </div>
        
        <div class="transcript-container">
            <div class="transcript-header">
                <h4>Transcript</h4>
                <button id="clearTranscript" class="btn btn-sm btn-outline-secondary">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
            <div id="transcript" class="transcript-content">
                <!-- Transcript will appear here -->
            </div>
        </div>
        
        <div class="command-history">
            <h4>Command History</h4>
            <div id="commandHistory" class="history-content">
                <!-- Command history will appear here -->
            </div>
        </div>
    </div>
</div>
